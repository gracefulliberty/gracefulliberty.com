{% extends "base.html" %}

{% block pagetitle %}
{{ section.title }}
{% endblock pagetitle %}

{% block content %}
{{section.content | safe }}
<ul>
{% for page in section.pages %}
 <li><a href="{{ page.permalink | safe }}">{{ page.date }} — {{ page.title }}</a></li>
{% endfor %}
</ul>

<p><a href="/atom.xml">Subscribe with RSS</a></p>
{% endblock content %}
